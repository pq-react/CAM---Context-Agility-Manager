name: CAM & Portal CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  cam-tests:
    name: Run CAM Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          sudo apt update
          sudo apt install -y lm-sensors  # Required for temperature readings

      - name: Run CAM Unit Tests
        run: |
          python -m unittest unittesting.py

  portal-tests:
    name: Run Portal Load Tests
    runs-on: ubuntu-latest
    needs: cam-tests  # Only run if CAM tests pass

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Locust
        run: |
          pip install locust

      - name: Run Locust Load Test
        run: |
          locust -f portal_testing.py --headless -u 100 -r 5 --run-time 30s
