name: CAM & Portal CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

# Don't burn CI minutes when a newer commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cam-tests:
    name: CAM unit tests
    runs-on: ubuntu-latest

    # Placeholder env so the modules can be imported in CI without
    # reaching a real InfluxDB / QUJATA endpoint. Tests mock the
    # `requests.post` call sites; these values are never dialled.
    env:
      CAM_INFLUXDB_URL:   http://localhost:8086/api/v2/write
      CAM_INFLUXDB_TOKEN: ci-placeholder-token
      CAM_INFLUXDB_ORG:   pqreact
      CAM_INFLUXDB_BUCKET: ci-bucket
      CAM_QUJATA_URL:     http://localhost:3010/curl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install lm-sensors (needed by get_temperatures path)
        run: |
          sudo apt-get update
          sudo apt-get install -y lm-sensors

      # Make `W_T_retrieval` and `performance_test` importable from the
      # repo root and discover tests inside the "Unit Testing" folder.
      # `test_performance_test.py` exercises an HTTP-only code path
      # against mocks; it is included.
      - name: Run unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m unittest discover \
            --start-directory "Unit Testing" \
            --pattern "test_*.py" \
            --verbose

  portal-tests:
    name: Locust portal load test (smoke)
    runs-on: ubuntu-latest
    needs: cam-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      # Smoke-check that the Locust file is syntactically valid and
      # the user class loads. The actual load test points at a private
      # operator portal that is not reachable from GitHub-hosted runners
      # — do NOT execute it from CI. Operators run the full load test
      # manually from a VPN-connected host.
      - name: Validate locustfile imports
        run: |
          python -c "
          import importlib.util, pathlib, sys
          spec = importlib.util.spec_from_file_location(
              'portal_testing',
              pathlib.Path('Portal Testing/portal_testing.py'),
          )
          mod = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mod)
          assert hasattr(mod, 'PortalUser'), 'PortalUser class missing'
          assert mod.PortalUser.tasks, 'PortalUser has no @task methods'
          print(f'OK — PortalUser loaded with {len(mod.PortalUser.tasks)} task(s)')
          "
