# Dashboard provisioning — load every JSON in /var/lib/grafana/dashboards
# at startup. Folder is "PQC Demo".
apiVersion: 1
providers:
  - name: 'CAM PQC Demo'
    orgId: 1
    folder: 'PQC Demo'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
