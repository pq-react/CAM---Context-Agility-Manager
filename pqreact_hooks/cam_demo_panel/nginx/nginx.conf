# Minimal PQC TLS server config for the CAM demo. Mirrors the upstream
# openquantumsafe/oqs-demos/nginx layout (paths under /opt/nginx) so we
# don't need to bind-mount openssl.cnf or the cert dir — they're already
# in the image.

worker_processes auto;
events { worker_connections 1024; }

http {
    sendfile on;
    keepalive_timeout 30;
    client_max_body_size 10M;

    # Format that includes the negotiated curve so Grafana can break the
    # chart down by algorithm. nginx exposes the kex group in
    # $ssl_curves on recent builds.
    log_format pqc-access '$remote_addr - [$time_local] '
                          '"$request" $status $body_bytes_sent '
                          'curves="$ssl_curves" '
                          'cipher="$ssl_cipher" '
                          'rt=$request_time';
    # Send logs to stdout/stderr — the upstream openquantumsafe/nginx
    # image doesn't pre-create /var/log/nginx, and `docker logs` is the
    # native way to consume them anyway.
    access_log /dev/stdout pqc-access;
    error_log  /dev/stderr info;

    server {
        listen 4433 ssl;
        server_name _;

        # The upstream OQS image installs CA + leaf at these paths.
        ssl_certificate     /opt/nginx/pki/server.crt;
        ssl_certificate_key /opt/nginx/pki/server.key;

        ssl_protocols       TLSv1.3;
        # 2026-05 update: the "don't pin a list" approach turned out to
        # be wrong. With no `ssl_ecdh_curve` directive set, modern
        # nginx + oqs-provider only ADVERTISES a small default subset
        # of groups (mlkem512/768/1024, X25519MLKEM768, and the classical
        # X25519 / P-256 / P-384) — clients that offer any other PQC
        # group via `--curves <id>` get a TLS handshake_failure (exit
        # 35) because the server doesn't list that group in its
        # supported_groups extension.
        #
        # Tested by sending one handshake per algorithm in algorithms.py
        # against this server with no curve list set; 11 of 21 failed
        # exit-35 (the frodo* / bikel* family + p256_mlkem512 and
        # p384_mlkem768 hybrids). Adding the explicit list below
        # surfaces every group oqs-provider knows about that we
        # actually want to demo.
        #
        # NB: `kyber*` and `x25519_kyber768` are intentionally absent —
        # those names were dropped from oqs-provider when ML-KEM was
        # standardised. Use `mlkem*` and `X25519MLKEM768` instead.
        ssl_ecdh_curve prime256v1:secp384r1:X25519:mlkem512:mlkem768:mlkem1024:X25519MLKEM768:SecP256r1MLKEM768:SecP384r1MLKEM1024:p256_mlkem512:p384_mlkem768:frodo640aes:frodo640shake:frodo976aes:frodo976shake:frodo1344aes:frodo1344shake:bikel1:bikel3:bikel5;

        # POST endpoint — echoes back a tiny ack. The body length matters
        # only as a way to make the handshake + transfer pipeline non-trivial.
        location / {
            return 200 'ok\n';
            add_header Content-Type text/plain;
        }

        # Health probe used by docker compose's healthcheck.
        location /healthz {
            return 200 'healthy\n';
            add_header Content-Type text/plain;
        }
    }
}
