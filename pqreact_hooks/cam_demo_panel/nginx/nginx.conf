# Minimal PQC TLS server config for the CAM demo. Mirrors the upstream
# openquantumsafe/oqs-demos/nginx layout (paths under /opt/nginx) so we
# don't need to bind-mount openssl.cnf or the cert dir — they're already
# in the image.

worker_processes auto;
events { worker_connections 1024; }

http {
    sendfile on;
    keepalive_timeout 30;
    client_max_body_size 10M;

    # Format that includes the negotiated curve so Grafana can break the
    # chart down by algorithm. nginx exposes the kex group in
    # $ssl_curves on recent builds.
    log_format pqc-access '$remote_addr - [$time_local] '
                          '"$request" $status $body_bytes_sent '
                          'curves="$ssl_curves" '
                          'cipher="$ssl_cipher" '
                          'rt=$request_time';
    # Send logs to stdout/stderr — the upstream openquantumsafe/nginx
    # image doesn't pre-create /var/log/nginx, and `docker logs` is the
    # native way to consume them anyway.
    access_log /dev/stdout pqc-access;
    error_log  /dev/stderr info;

    server {
        listen 4433 ssl;
        server_name _;

        # The upstream OQS image installs CA + leaf at these paths.
        ssl_certificate     /opt/nginx/pki/server.crt;
        ssl_certificate_key /opt/nginx/pki/server.key;

        ssl_protocols       TLSv1.3;
        # `ssl_ecdh_curve` is intentionally not set — modern nginx + OQS
        # provider accepts whatever group the client requests via
        # `--curves <id>`. The set of supported names varies between
        # oqs-provider releases (e.g. kyber* vs mlkem*), so we don't
        # pin a list here that might silently fail at startup.

        # POST endpoint — echoes back a tiny ack. The body length matters
        # only as a way to make the handshake + transfer pipeline non-trivial.
        location / {
            return 200 'ok\n';
            add_header Content-Type text/plain;
        }

        # Health probe used by docker compose's healthcheck.
        location /healthz {
            return 200 'healthy\n';
            add_header Content-Type text/plain;
        }
    }
}
