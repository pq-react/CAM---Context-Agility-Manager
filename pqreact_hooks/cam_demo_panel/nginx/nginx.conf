# Minimal PQC TLS server config for the CAM demo. Mirrors the upstream
# openquantumsafe/oqs-demos/nginx layout (paths under /opt/nginx) so we
# don't need to bind-mount openssl.cnf or the cert dir — they're already
# in the image.

worker_processes auto;
events { worker_connections 1024; }

http {
    sendfile on;
    keepalive_timeout 30;
    client_max_body_size 10M;

    # Format that includes the negotiated curve so Grafana can break the
    # chart down by algorithm. nginx exposes the kex group in
    # $ssl_curves on recent builds.
    log_format pqc-access '$remote_addr - [$time_local] '
                          '"$request" $status $body_bytes_sent '
                          'curves="$ssl_curves" '
                          'cipher="$ssl_cipher" '
                          'rt=$request_time';
    access_log /var/log/nginx/access.log pqc-access;
    error_log  /var/log/nginx/error.log info;

    server {
        listen 4433 ssl;
        server_name _;

        # The upstream OQS image installs CA + leaf at these paths.
        ssl_certificate     /opt/nginx/pki/server.crt;
        ssl_certificate_key /opt/nginx/pki/server.key;

        ssl_protocols       TLSv1.3;
        # Accept any group OQS-OpenSSL knows about. The client picks via
        # `--curves <id>` so the server doesn't need a narrower allow-list.
        ssl_ecdh_curve      prime256v1:secp384r1:frodo640aes:frodo640shake:frodo976aes:frodo976shake:frodo1344aes:frodo1344shake:mlkem512:p256_mlkem512:mlkem768:p384_mlkem768:X25519MLKEM768:mlkem1024:bikel1:bikel3:bikel5:kyber512:kyber768:kyber1024;

        # POST endpoint — echoes back a tiny ack. The body length matters
        # only as a way to make the handshake + transfer pipeline non-trivial.
        location / {
            return 200 'ok\n';
            add_header Content-Type text/plain;
        }

        # Health probe used by docker compose's healthcheck.
        location /healthz {
            return 200 'healthy\n';
            add_header Content-Type text/plain;
        }
    }
}
